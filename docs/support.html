<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>カラコン図鑑 サポート</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fcfbff;
      --bg-soft: #fbf7ff;
      --card: rgba(255, 255, 255, 0.9);
      --text: #3a3143;
      --muted: #786f84;
      --accent: #f3bfd2;
      --accent-2: #d9cbf8;
      --accent-3: #f8d6b1;
      --accent-ink: #745f96;
      --border: rgba(58, 49, 67, 0.08);
      --shadow: 0 14px 30px rgba(144, 122, 176, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(243, 191, 210, 0.42), transparent 30%),
        radial-gradient(circle at top right, rgba(217, 203, 248, 0.34), transparent 24%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      line-height: 1.7;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .hero,
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 40px 28px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -120px -120px auto;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(248, 214, 177, 0.4), rgba(248, 214, 177, 0));
      pointer-events: none;
    }

    .eyebrow {
      margin: 0 0 10px;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      color: var(--accent-ink);
      font-weight: 700;
    }

    h1,
    h2 {
      line-height: 1.2;
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      margin-bottom: 14px;
    }

    p {
      margin: 0;
    }

    .lead {
      max-width: 42rem;
      color: var(--muted);
      font-size: 1.04rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    .contact-mail {
      display: inline-block;
      padding: 14px 18px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--border);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      word-break: break-all;
    }

    .contact-mail strong,
    .button strong {
      display: block;
      font-size: 0.82rem;
      opacity: 0.8;
    }

    .card {
      padding: 24px;
    }

    .card h2 {
      font-size: 1.18rem;
      margin-bottom: 12px;
    }

    .card p,
    .card li {
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 1.2rem;
    }

    a {
      color: var(--accent-ink);
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #4f4265;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(175, 158, 208, 0.2);
    }

    .button:hover,
    .button:focus-visible {
      filter: brightness(1.03);
    }

    footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Support Page</p>
      <h1>カラコン図鑑 サポート</h1>
      <p class="lead">
        カラコン図鑑に関するご質問や不具合報告のためのサポートページです。
        お問い合わせは、下記のメールアドレスまたはお問い合わせフォームからご連絡ください。
      </p>
      <div class="hero-actions">
        <a class="contact-mail" href="mailto:haruka_617@icloud.com">
          <strong>メールで問い合わせ</strong>
          haruka_617@icloud.com
        </a>
        <a class="button" href="https://docs.google.com/forms/d/e/1FAIpQLSdHMstMDUJ2LhsG9YnGRkoHAx7cqlpIgMW9r5dzOw98QWlzzQ/viewform?usp=dialog" target="_blank" rel="noopener noreferrer">
          <strong>フォームで問い合わせ</strong>
          お問い合わせフォームを開く
        </a>
      </div>
    </section>

    <footer>
      最終更新日: 2026-06-07
    </footer>
  </main>
</body>
</html>
